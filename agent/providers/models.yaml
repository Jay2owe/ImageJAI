# ImageJAI unified model registry — single source of truth for both the
# Java ProviderRegistry (cascading dropdown) and Python agent/contexts/loader.py
# (per-model context overlays, Phase F).
#
# Schema reference: docs/multi_provider/02_curation_strategy.md §1.
# Tier vocabulary: free | free-with-limits | paid | requires-subscription
# Reliability vocabulary: high | medium | low
# Provider keys must match the canonical hyphenated set in agent/providers/router.py.
#
# Phase G fields (auto-discovery + curation + soft-deprecation):
#   curated         : true for every entry in this file
#   pinned          : curator pin (user pin lives in models_local.yaml)
#   last_verified   : ISO date — audit tool flags entries >90 days stale
#   deprecated_since: optional ISO date — set when upstream /models drops the entry
#   replacement     : optional model_id — surfaced in "no longer available" dialog
#
# Each consumer ignores fields it does not recognise. Display fields
# (display_name/description/tier/pinned/vision_capable) are read by Java;
# context-loader fields (harness/family/context_size/tool_call_reliability)
# are read by the Python loader landed in Phase F.
#
# Phase F context-loader fields (see docs/multi_provider/04_context_strategy.md):
#   harness        : cli_shell | tool_loop
#   family         : claude | gemma | llama | qwen | gpt | mistral |
#                    deepseek | kimi | glm | grok | phi | gptoss | (other)
#   context_size   : small | medium | large
#
# Phase C native_features block — opt-in capabilities the OpenAI translation
# loses (only honoured by anthropic + gemini native clients):
#   prompt_caching   : bool  (anthropic) — mark system + last tool block ephemeral
#   thinking_budget  : int   (anthropic + gemini) — extended thinking budget tokens
#   server_tools     : list  (anthropic) — ["web_search", "code_execution"]
#   google_search    : bool  (gemini)    — attach Google Search grounding
#   code_execution   : bool  (gemini)    — attach Google sandbox code execution
#
# Phase C / H field — Anthropic Opus 4.7 tokenizer cost shift (verification
# report E.8 / risk #24). Opus 4.7 ships a new tokenizer that consumes ~35%
# more tokens than 4.5 for the same English text. The multiplier is captured
# as a structured field so Phase H's budget-ceiling fallback (local
# token-count × yaml price), the typical-session estimate, and hover-card
# pricing all apply it without re-deriving the constant from prose.
#   tokenizer_multiplier : float — multiply local tiktoken count by this before
#                                  pricing math. Defaults to 1.0 when absent.

models:
  # ============================================================================
  # Anthropic — paid, native bypass path (prompt caching, parallel tool calls)
  # ============================================================================
  - provider: anthropic
    model_id: claude-opus-4-7
    display_name: Claude Opus 4.7
    description: >
      Anthropic's strongest model for long Fiji sessions. Best at multi-step
      tool calls and writing reliable ImageJ macros.
    tier: paid
    context_window: 1000000
    vision_capable: true
    tool_call_reliability: high
    last_verified: 2026-05-01
    pinned: true
    curated: true
    harness: cli_shell
    family: claude
    context_size: large
    deprecated_since: null
    replacement: null
    native_features:
      prompt_caching: true
    pricing:
      input_usd_per_mtok: 15.0
      output_usd_per_mtok: 75.0
    tokenizer_multiplier: 1.35
    notes: >
      Opus 4.7 tokenizer consumes ~35% more tokens than 4.5 for the same
      English text (verification report E.8). Phase H must apply
      tokenizer_multiplier to the local-token-count × yaml-price fallback,
      to typical-session estimates (06 §2.4 / §3.2), and to hover-card
      pricing ranges. Cache-hit tests in test_anthropic_native_features.py
      already exercise Opus 4.7 directly so the multiplier is exercised on
      the request path. Pricing reflects Anthropic's May 2026 published
      list rates (input $15 / output $75 per million tokens) — the
      multiplier scales the local token count *before* this rate is
      applied, so the fallback ceiling sees the true Opus 4.7 cost shape.

