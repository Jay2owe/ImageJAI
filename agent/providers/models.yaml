# ImageJAI unified model registry — single source of truth for both the
# Java ProviderRegistry (cascading dropdown) and Python agent/contexts/loader.py
# (per-model context overlays, Phase F).
#
# Schema reference: docs/multi_provider/02_curation_strategy.md §1.
# Tier vocabulary: free | free-with-limits | paid | requires-subscription
# Reliability vocabulary: high | medium | low
# Provider keys must match the canonical hyphenated set in agent/providers/router.py.
#
# Each consumer ignores fields it does not recognise. Display fields
# (display_name/description/tier/pinned/vision_capable) are read by Java;
# context-loader fields (harness/family/context_size/tool_call_reliability)
# are read by the Python loader landed in Phase F.
#
# Phase F context-loader fields (see docs/multi_provider/04_context_strategy.md):
#   harness        : cli_shell | tool_loop
#   family         : claude | gemma | llama | qwen | gpt | mistral |
#                    deepseek | kimi | glm | grok | phi | gptoss | (other)
#   context_size   : small | medium | large  (loader applies small_context overlay when "small")
#   tool_call_reliability  : high | medium | low (already shipped in Phase D)

models:
  # ---------------- Anthropic (paid — placeholder until Phase H tier safety) ---
  - provider: anthropic
    model_id: claude-opus-4-7
    display_name: Claude Opus 4.7
    description: >
      Anthropic's strongest model for long Fiji sessions. Best at multi-step
      tool calls and writing reliable ImageJ macros.
    tier: paid
    context_window: 1000000
    vision_capable: true
    tool_call_reliability: high
    last_verified: 2026-05-01
    pinned: true
    curated: true
    harness: cli_shell
    family: claude
    context_size: large

  - provider: anthropic
    model_id: claude-sonnet-4-6
    display_name: Claude Sonnet 4.6
    description: >
      Balanced Claude for typical analysis sessions. Strong tool reliability
      at a fraction of Opus pricing.
    tier: paid
    context_window: 1000000
    vision_capable: true
    tool_call_reliability: high
    last_verified: 2026-05-01
    pinned: false
    curated: true
    harness: cli_shell
    family: claude
    context_size: large

  - provider: anthropic
    model_id: claude-haiku-4-5
    display_name: Claude Haiku 4.5
    description: >
      Fastest, cheapest Claude. Good for short turns and quick iteration.
    tier: paid
    context_window: 200000
    vision_capable: true
    tool_call_reliability: high
    last_verified: 2026-05-01
    pinned: false
    curated: true
    harness: cli_shell
    family: claude
    context_size: large

