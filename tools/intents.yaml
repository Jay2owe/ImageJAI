- id: image.pixel_size
  description: Report the active image's pixel size
  seeds: ["pixel size", "what is the calibration"]

- id: image.dimensions
  description: Report the active image dimensions as width, height, channels, slices, and frames
  seeds: ["image dimensions", "how big is this image"]

- id: image.bit_depth
  description: Report the active image bit depth
  seeds: ["bit depth", "is this 8 bit or 16 bit"]

- id: image.stack_counts
  description: Report the number of channels, slices, and frames in the active image
  seeds: ["how many channels", "number of z slices"]

- id: image.position
  description: Report the active channel, slice, and frame number
  seeds: ["current slice", "what channel am i on"]

- id: image.title_path
  description: Report the active image title and file path
  seeds: ["image title", "where is this file saved"]

- id: image.intensity_stats
  description: Report min, max, and mean intensity for the active channel
  seeds: ["intensity stats", "mean brightness"]

- id: image.list_open
  description: List all open images
  seeds: ["list open images", "what images are open"]

- id: image.saturation_check
  description: Check whether the active image has saturated pixels
  seeds: ["is anything saturated", "check clipping"]

- id: image.close_all
  description: Close all open images while keeping the ImageJ Log window open
  seeds: ["close all images", "close everything"]

- id: image.close_active
  description: Close the active image
  seeds: ["close this image", "close active image"]

- id: image.close_others
  description: Close all open images except the active image while keeping the ImageJ Log window open
  seeds: ["close all but active", "keep this image only"]

- id: image.duplicate
  description: Duplicate the active image
  seeds: ["duplicate image", "make a copy"]

- id: image.revert
  description: Revert the active image to the saved file
  seeds: ["revert image", "reload from disk"]

- id: image.save_as
  description: Save the active image as TIFF, PNG, or JPEG under AI_Exports next to the opened image
  slots:
    - name: format
      description: Output image format, such as TIFF, PNG, or JPEG
    - name: filename
      description: Output filename under AI_Exports
  seeds: ["save as tiff", "export png"]

- id: image.next_slice
  description: Move the active image to the next slice
  seeds: ["next slice", "go forward one z"]

- id: image.previous_slice
  description: Move the active image to the previous slice
  seeds: ["previous slice", "go back one z"]

- id: image.switch_channel
  description: Switch the active image to a specified channel number
  slots:
    - name: channel
      description: One-based channel number
  seeds: ["switch to channel 2", "show c3"]

- id: image.jump_slice
  description: Jump the active image to a specified slice number
  slots:
    - name: slice
      description: One-based slice number
  seeds: ["go to slice 10", "jump to z 5"]

- id: image.jump_frame
  description: Jump the active image to a specified time frame number
  slots:
    - name: frame
      description: One-based frame number
  seeds: ["go to frame 3", "jump to timepoint 12"]

- id: image.merge_channels
  description: Merge separate channel images into a composite image
  seeds: ["merge channels", "combine channel windows"]

- id: image.split_channels
  description: Split a multi-channel image into separate channel images
  seeds: ["split channels", "isolate the channels"]

- id: image.z_project
  description: Create a z projection using max, mean, sum, standard deviation, or another projection method
  slots:
    - name: method
      description: Projection method
  seeds: ["z project max", "make a max projection"]

- id: image.make_substack
  description: Make a substack from selected channels, slices, or frames
  slots:
    - name: range
      description: Channel, slice, or frame range
  seeds: ["make substack", "extract slices 4 to 12"]

- id: image.crop_to_selection
  description: Crop the active image to the current selection
  seeds: ["crop to selection", "crop this roi"]

- id: image.scale
  description: Scale the active image by a numeric factor
  slots:
    - name: factor
      description: Scale factor
  seeds: ["scale image by 2", "resize to half"]

- id: image.invert
  description: Invert the active image pixel values
  seeds: ["invert image", "invert pixels"]

- id: image.invert_lut
  description: Invert the active image lookup table without changing pixel values
  seeds: ["invert lut", "reverse the display colors"]

- id: image.convert_type
  description: Convert the active image to 8-bit, 16-bit, 32-bit, RGB, or composite display
  slots:
    - name: type
      description: Target image type
  seeds: ["convert to 8 bit", "make rgb"]

- id: image.set_scale
  description: Set the image spatial calibration from a pixel-to-distance relationship
  slots:
    - name: pixels
      description: Pixel distance
    - name: distance
      description: Real-world distance
    - name: unit
      description: Calibration unit
  seeds: ["set scale 100 px equals 10 um", "calibrate distance"]

- id: preprocess.subtract_background
  description: Subtract background using a rolling ball radius
  slots:
    - name: radius
      description: Rolling ball radius
  seeds: ["subtract background", "rolling ball 50"]

- id: preprocess.gaussian_blur
  description: Apply a Gaussian blur with a specified sigma
  slots:
    - name: sigma
      description: Gaussian sigma
  seeds: ["gaussian blur sigma 2", "smooth the image"]

- id: preprocess.median_filter
  description: Apply a median filter with a specified radius
  slots:
    - name: radius
      description: Median filter radius
  seeds: ["median filter", "despeckle radius 2"]

- id: preprocess.mean_filter
  description: Apply a mean filter with a specified radius
  slots:
    - name: radius
      description: Mean filter radius
  seeds: ["mean filter", "average filter"]

- id: preprocess.variance_filter
  description: Apply a variance filter with a specified radius
  slots:
    - name: radius
      description: Variance filter radius
  seeds: ["variance filter", "local variance"]

- id: preprocess.unsharp_mask
  description: Apply an unsharp mask to sharpen the active image
  slots:
    - name: radius
      description: Blur radius
    - name: mask
      description: Mask weight
  seeds: ["unsharp mask", "sharpen image"]

- id: preprocess.bandpass_filter
  description: Apply a bandpass filter to remove small noise and large background features
  slots:
    - name: small
      description: Small structure cutoff
    - name: large
      description: Large structure cutoff
  seeds: ["bandpass filter", "remove background and noise"]

- id: segment.auto_threshold
  description: Auto-threshold the active image using a named threshold method and optional dark background
  slots:
    - name: method
      description: Threshold method such as Otsu, Li, Triangle, Huang, MaxEntropy, or Default
    - name: dark_background
      description: Whether objects are bright on dark background
  seeds: ["otsu threshold", "auto threshold dark background"]

- id: segment.compare_thresholds
  description: Compare several threshold methods for the active image
  seeds: ["compare thresholds", "which threshold is best"]

- id: segment.convert_to_mask
  description: Convert the current threshold to a binary mask with black background handling
  seeds: ["convert to mask", "make binary mask"]

- id: segment.count_particles
  description: Count cells, nuclei, or particles in the active image
  slots:
    - name: size
      description: Particle size range
  seeds: ["count cells", "count nuclei"]

- id: segment.fill_holes
  description: Fill holes in a binary mask
  seeds: ["fill holes", "close holes in mask"]

- id: segment.watershed
  description: Split touching objects in a binary mask with watershed
  seeds: ["watershed", "separate touching cells"]

- id: segment.skeletonize
  description: Skeletonize a binary mask
  seeds: ["skeletonize", "make skeleton"]

- id: segment.distance_map
  description: Create a distance map from a binary mask
  seeds: ["distance map", "distance transform"]

- id: segment.voronoi
  description: Create a Voronoi segmentation from a binary mask
  seeds: ["voronoi", "voronoi cells"]

- id: segment.find_maxima
  description: Find local maxima with a specified prominence
  slots:
    - name: prominence
      description: Noise tolerance or prominence
  seeds: ["find maxima", "detect bright spots"]

- id: measure.intensity
  description: Measure intensity in the active image or current selection
  seeds: ["measure intensity", "mean fluorescence"]

- id: measure.ctcf
  description: Measure corrected total cell fluorescence
  seeds: ["measure ctcf", "corrected total cell fluorescence"]

- id: measure.rois
  description: Measure all ROIs in the ROI Manager
  seeds: ["measure rois", "measure all roi manager regions"]

- id: results.summarise
  description: Summarise the current results table
  seeds: ["summarise results", "results summary"]

- id: results.clear
  description: Clear the results table
  seeds: ["clear results", "empty results table"]

- id: measure.set_measurements
  description: Set measurement options such as area, mean, integrated density, and shape descriptors
  slots:
    - name: measurements
      description: Measurement options to enable
  seeds: ["set measurements area mean", "measure integrated density"]

- id: measure.line_profile
  description: Plot or report the intensity profile along a line selection
  seeds: ["line profile", "plot profile"]

- id: measure.histogram
  description: Show the active image histogram
  seeds: ["histogram", "intensity histogram"]

- id: measure.nearest_neighbour
  description: Measure nearest-neighbour distances between objects or ROIs
  seeds: ["nearest neighbour distance", "nearest cell spacing"]

- id: roi.list
  description: List ROIs in the ROI Manager
  seeds: ["list rois", "show roi manager entries"]

- id: roi.count
  description: Count ROIs in the ROI Manager
  seeds: ["count rois", "how many rois"]

- id: roi.clear
  description: Clear the ROI Manager
  seeds: ["clear roi manager", "delete rois"]

- id: roi.save
  description: Save ROI Manager contents to AI_Exports next to the opened image
  seeds: ["save rois", "export roi zip"]

- id: results.show
  description: Show the results table
  seeds: ["show results table", "open results"]

- id: results.save_csv
  description: Save the results table as a CSV file in AI_Exports next to the opened image
  slots:
    - name: filename
      description: Output CSV filename
  seeds: ["save results csv", "export measurements"]

- id: display.auto_contrast
  description: Auto contrast the active image for display only without modifying pixel values
  seeds: ["auto contrast", "improve display contrast"]

- id: display.reset
  description: Reset the active image display range
  seeds: ["reset display", "reset brightness contrast"]

- id: display.fit_window
  description: Fit the image window to the active image
  seeds: ["fit window", "fit image to screen"]

- id: display.zoom
  description: Set image zoom to a specified percentage
  slots:
    - name: percent
      description: Zoom percentage
  seeds: ["zoom to 100 percent", "set zoom 200"]

- id: dialog.threshold
  description: Open the Threshold dialog and let the user choose parameters
  seeds: ["open threshold dialog", "show threshold"]

- id: dialog.analyze_particles
  description: Open the Analyze Particles dialog and let the user choose parameters
  seeds: ["open analyze particles", "show particle analyzer"]

- id: dialog.find_maxima
  description: Open the Find Maxima dialog and let the user choose parameters
  seeds: ["open find maxima", "find maxima dialog"]

- id: dialog.gaussian_blur
  description: Open the Gaussian Blur dialog and let the user choose parameters
  seeds: ["open gaussian blur", "blur dialog"]

- id: dialog.subtract_background
  description: Open the Subtract Background dialog and let the user choose parameters
  seeds: ["open subtract background", "rolling ball dialog"]

- id: diagnostics.plugins
  description: List installed plugins and Fiji commands
  seeds: ["what plugins do i have", "list commands"]

- id: diagnostics.open_recorder
  description: Open the ImageJ macro recorder
  seeds: ["open macro recorder", "show recorder"]

- id: diagnostics.open_roi_manager
  description: Open the ROI Manager
  seeds: ["open roi manager", "show roi manager"]

- id: diagnostics.open_channels_tool
  description: Open the Channels Tool
  seeds: ["open channels tool", "show channels tool"]

- id: diagnostics.show_log
  description: Show the ImageJ Log window
  seeds: ["show log", "open imagej log"]

- id: diagnostics.show_console
  description: Show recent Fiji console output
  seeds: ["show console", "fiji stdout"]

- id: diagnostics.open_dialogs
  description: List any open dialogs
  seeds: ["any open dialogs", "what dialogs are open"]

- id: diagnostics.memory
  description: Report memory usage
  seeds: ["memory used", "how much memory"]

- id: diagnostics.garbage_collect
  description: Run garbage collection to free memory
  seeds: ["garbage collect", "free memory"]

- id: builtin.help
  description: Show Local Assistant help and supported commands
  seeds: ["help", "what can you do"]

- id: builtin.agent
  description: Report which assistant or agent is active
  seeds: ["which agent am i using", "current assistant"]

- id: builtin.version
  description: Report the ImageJAI Local Assistant version
  seeds: ["version", "local assistant version"]
